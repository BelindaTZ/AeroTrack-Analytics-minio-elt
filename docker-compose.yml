version: '3.8'

# ─────────────────────────────────────────
#  RED COMPARTIDA
# ─────────────────────────────────────────
networks:
  elt-network:
    driver: bridge

# ─────────────────────────────────────────
#  VOLÚMENES PERSISTENTES
# ─────────────────────────────────────────
volumes:
  minio-data:
  pocketbase-data:
  postgres-data:

# ─────────────────────────────────────────
#  SERVICIOS
# ─────────────────────────────────────────
services:

  # ── 1. MINIO ──────────────────────────
  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Consola web
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin1234
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - elt-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── 2. POCKETBASE ─────────────────────
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:0.22.4
    container_name: pocketbase
    ports:
      - "8090:8090"   # UI en http://localhost:8090/_/
    volumes:
      - pocketbase-data:/pb_data
    networks:
      - elt-network

  # ── 3. POSTGRES (base de Airflow) ─────
  postgres:
    image: postgres:15
    container_name: postgres-airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - elt-network

  # ── 4. AIRFLOW INIT (solo corre una vez)
  airflow-init:
    image: apache/airflow:2.9.3-python3.12
    container_name: airflow-init
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin1234
      _PIP_ADDITIONAL_REQUIREMENTS: "requests pandas pyarrow minio"
    command: >
      bash -c "airflow db init &&
               airflow users create
               --username admin
               --password admin1234
               --firstname Belinda
               --lastname España
               --role Admin
               --email admin@minio-elt.com"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    networks:
      - elt-network

  # ── 5. AIRFLOW WEBSERVER ──────────────
  airflow-webserver:
    image: apache/airflow:2.9.3-python3.12
    container_name: airflow-webserver
    depends_on:
      - postgres
      - airflow-init
    ports:
      - "8080:8080"   # UI en http://localhost:8080
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      _PIP_ADDITIONAL_REQUIREMENTS: "requests pandas pyarrow minio"
    command: webserver
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    networks:
      - elt-network
    restart: unless-stopped

  # ── 6. AIRFLOW SCHEDULER ──────────────
  airflow-scheduler:
    image: apache/airflow:2.9.3-python3.12
    container_name: airflow-scheduler
    depends_on:
      - postgres
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      _PIP_ADDITIONAL_REQUIREMENTS: "requests pandas pyarrow minio"
    command: scheduler
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    networks:
      - elt-network
    restart: unless-stopped