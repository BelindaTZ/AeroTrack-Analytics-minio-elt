{% extends "base.html" %}
{% block title %}Editar rol — AeroTrack Analytics{% endblock %}
{% block breadcrumb %}Administración › <a href="/auth/roles" style="color:var(--at-muted);text-decoration:none">Roles</a> › Editar{% endblock %}
{% block content %}
<div class="page-heading">
  <h1><i class="bi bi-pencil-square" style="color:var(--at-coral);margin-right:8px"></i>Editar rol</h1>
</div>
{% if error %}<div class="flash-bar"><div class="flash-error"><i class="bi bi-exclamation-triangle-fill"></i> {{ error }}</div></div>{% endif %}
<div class="at-card" style="max-width:480px">
  <form action="/auth/roles/{{ rol.id }}" method="post">
    <div style="margin-bottom:16px">
      <label class="form-label-at">Nombre del rol</label>
      <input type="text" name="nombre" class="form-control-at" value="{{ rol.nombre }}" required />
    </div>
    <div style="margin-bottom:24px">
      <label class="form-label-at">Descripción</label>
      <input type="text" name="descripcion" class="form-control-at" value="{{ rol.descripcion or '' }}" />
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn-at-primary"><i class="bi bi-floppy-fill"></i> Guardar</button>
      <a href="/auth/roles" class="btn-at-ghost"><i class="bi bi-arrow-left"></i> Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
