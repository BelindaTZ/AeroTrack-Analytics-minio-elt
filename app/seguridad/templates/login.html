<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — AeroTrack Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    :root{--at-navy:#1B3A6B;--at-coral:#E05A4E;--at-bg:#F4F6F9}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--at-bg);min-height:100vh;display:flex;align-items:center;justify-content:center}
    .login-card{background:#fff;border-radius:16px;padding:44px 40px;width:100%;max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:32px}
    .brand-icon{width:44px;height:44px;background:var(--at-coral);border-radius:10px;display:flex;align-items:center;justify-content:center}
    .brand-icon i{color:#fff;font-size:22px}
    .brand-name{font-size:20px;font-weight:700;color:var(--at-navy)}
    .brand-sub{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1.5px}
    .form-label-at{font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:block}
    .form-control-at{width:100%;padding:11px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;color:#1e293b;background:#fff;outline:none;transition:border-color .2s,box-shadow .2s;font-family:'Inter',sans-serif}
    .form-control-at:focus{border-color:var(--at-navy);box-shadow:0 0 0 3px rgba(27,58,107,.1)}
    .btn-login{width:100%;background:var(--at-navy);color:#fff;border:none;padding:12px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-login:hover{background:#132d54}
    .error-box{background:#fef2f2;border:1px solid #fca5a5;color:#991b1b;border-radius:8px;padding:10px 14px;font-size:13.5px;display:flex;align-items:center;gap:8px;margin-bottom:16px}
    .msg-box{background:#ecfdf5;border:1px solid #6ee7b7;color:#065f46;border-radius:8px;padding:10px 14px;font-size:13.5px;display:flex;align-items:center;gap:8px;margin-bottom:16px}
    .pass-wrap{position:relative}
    .pass-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#64748b;cursor:pointer;font-size:16px}
  </style>
</head>
<body>
<div class="login-card">
  <div class="brand">
    <div class="brand-icon"><i class="bi bi-airplane-fill"></i></div>
    <div>
      <div class="brand-name">AeroTrack</div>
      <div class="brand-sub">Analytics Suite</div>
    </div>
  </div>

  <h2 style="font-size:18px;font-weight:700;margin-bottom:6px;color:#1e293b">Iniciar sesión</h2>
  <p style="font-size:13px;color:#64748b;margin-bottom:24px">Ingresa tus credenciales para continuar.</p>

  {% set msg = request.query_params.get('msg', '') %}
  {% if msg == 'sesion_cerrada' %}
  <div class="msg-box"><i class="bi bi-check-circle-fill"></i> Sesión cerrada correctamente.</div>
  {% endif %}

  {% if error %}
  <div class="error-box"><i class="bi bi-exclamation-triangle-fill"></i> {{ error }}</div>
  {% endif %}

  <form action="/auth/login" method="post" id="login-form">
    <div style="margin-bottom:16px">
      <label class="form-label-at" for="email">Email</label>
      <input type="email" id="email" name="email" class="form-control-at"
             placeholder="usuario@ejemplo.com" required autocomplete="email" />
    </div>
    <div style="margin-bottom:24px">
      <label class="form-label-at" for="password">Contraseña</label>
      <div class="pass-wrap">
        <input type="password" id="password" name="password" class="form-control-at"
               placeholder="••••••••" required autocomplete="current-password" />
        <button type="button" class="pass-toggle" onclick="togglePass()" id="btn-toggle-pass">
          <i class="bi bi-eye" id="eye-icon"></i>
        </button>
      </div>
    </div>
    <button type="submit" class="btn-login" id="btn-submit">
      <i class="bi bi-box-arrow-in-right"></i> Ingresar
    </button>
  </form>
</div>

<script>
function togglePass(){
  const inp=document.getElementById('password');
  const ico=document.getElementById('eye-icon');
  if(inp.type==='password'){inp.type='text';ico.className='bi bi-eye-slash'}
  else{inp.type='password';ico.className='bi bi-eye'}
}
document.getElementById('login-form').addEventListener('submit',function(){
  const btn=document.getElementById('btn-submit');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner-border spinner-border-sm me-2"></span> Ingresando…';
})
</script>
</body>
</html>
