{% extends "base.html" %}
{% block title %}Editar usuario — AeroTrack Analytics{% endblock %}
{% block breadcrumb %}Administración › <a href="/auth/usuarios" style="color:var(--at-muted);text-decoration:none">Usuarios</a> › Editar{% endblock %}
{% block content %}
<div class="page-heading">
  <h1><i class="bi bi-pencil-square" style="color:var(--at-coral);margin-right:8px"></i>Editar usuario</h1>
</div>

{% if error %}<div class="flash-bar"><div class="flash-error"><i class="bi bi-exclamation-triangle-fill"></i> {{ error }}</div></div>{% endif %}

<div class="at-card" style="max-width:560px">
  <form action="/auth/usuarios/{{ record.id }}" method="post">
    <div style="margin-bottom:16px">
      <label class="form-label-at">Nombre completo</label>
      <input type="text" name="nombre" class="form-control-at" value="{{ record.nombre }}" required />
    </div>
    <div style="margin-bottom:16px">
      <label class="form-label-at">Email</label>
      <input type="email" name="email" class="form-control-at" value="{{ record.email }}" required />
    </div>
    <div style="margin-bottom:24px">
      <label class="form-label-at">Rol</label>
      <select name="rol_id" class="form-control-at" required>
        {% for rol in roles %}
        <option value="{{ rol.id }}" {% if rol.id == record.rol_id %}selected{% endif %}>{{ rol.nombre }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn-at-primary"><i class="bi bi-floppy-fill"></i> Guardar cambios</button>
      <a href="/auth/usuarios" class="btn-at-ghost"><i class="bi bi-arrow-left"></i> Cancelar</a>
    </div>
  </form>

  <hr style="margin:24px 0;border-color:var(--at-border)">
  <h6 style="font-size:13px;font-weight:600;color:var(--at-muted);margin-bottom:12px">Resetear contraseña</h6>
  <form action="/auth/usuarios/{{ record.id }}/reset-password" method="post" style="display:inline">
    <input type="hidden" name="nombre" value="{{ record.nombre }}" />
    <button type="submit" class="btn-at-ghost" onclick="return confirm('¿Resetear la contraseña de este usuario?')">
      <i class="bi bi-key"></i> Resetear contraseña
    </button>
  </form>
</div>
{% endblock %}
