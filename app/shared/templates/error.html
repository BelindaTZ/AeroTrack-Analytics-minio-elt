{% extends "base.html" %}
{% block title %}Error {{ codigo }} — AeroTrack Analytics{% endblock %}
{% block content %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px;text-align:center">
  <div style="font-size:72px;font-weight:800;color:var(--at-border);line-height:1;margin-bottom:8px">{{ codigo }}</div>
  <h2 style="font-size:20px;font-weight:700;margin-bottom:8px">
    {% if codigo == 404 %}Página no encontrada{% elif codigo == 403 %}Acceso denegado{% else %}Error del servidor{% endif %}
  </h2>
  <p style="color:var(--at-muted);font-size:14px;max-width:400px;margin-bottom:24px">{{ mensaje }}</p>
  <a href="/pipeline" class="btn-at-primary"><i class="bi bi-house-fill"></i> Ir al inicio</a>
</div>
{% endblock %}
